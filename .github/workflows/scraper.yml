name: Scrape Sflix TV Shows

on:
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours
  workflow_dispatch:          # allows manual trigger from GitHub UI
    inputs:
      pages:
        description: "Number of pages to scrape (default: 10)"
        required: false
        default: "10"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          SCRAPER_PAGES: ${{ github.event.inputs.pages || '10' }}
        run: python scraper.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet sflix_tv_shows*.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sflix_tv_shows*.json
          git commit -m "chore: update sflix TV shows [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
